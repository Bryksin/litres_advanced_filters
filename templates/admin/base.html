<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Админ-панель{% endblock %} — Литрес Фильтры</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    /* ===== Admin layout ===== */
    body.admin-body {
      background: var(--sb-bg);
      color: var(--sb-text);
      margin: 0;
      min-height: 100vh;
    }

    .admin-topbar {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-3) var(--space-6);
      background: rgba(0, 0, 0, 0.25);
      border-bottom: 1px solid var(--sb-border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .admin-topbar__back {
      color: var(--sb-accent);
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: var(--space-1);
      transition: color var(--transition);
      flex-shrink: 0;
    }
    .admin-topbar__back:hover { color: var(--sb-text-bright); }
    .admin-topbar__back svg { width: 16px; height: 16px; }
    .admin-topbar__title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--sb-text-bright);
      letter-spacing: -0.01em;
    }

    .admin-content {
      max-width: 960px;
      margin: 0 auto;
      padding: var(--space-6);
    }

    /* ===== Admin cards ===== */
    .admin-section {
      margin-bottom: var(--space-8);
    }
    .admin-section__title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--sb-accent-dim);
      margin: 0 0 var(--space-3);
    }
    .admin-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--sb-border);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      transition: border-color var(--transition);
    }
    .admin-card + .admin-card {
      margin-top: var(--space-3);
    }

    /* ===== Status badges ===== */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1.6;
      white-space: nowrap;
    }
    .badge--done       { background: rgba(76, 175, 124, 0.18); color: #6dd9a0; }
    .badge--failed     { background: rgba(220, 69, 69, 0.18);  color: #f07070; }
    .badge--running    { background: rgba(232, 168, 50, 0.18);  color: #f0c050; }
    .badge--interrupted{ background: rgba(200, 130, 50, 0.18);  color: #dda050; }
    .badge--unknown    { background: rgba(200, 200, 200, 0.12); color: var(--sb-text); }

    /* ===== Stat grid ===== */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: var(--space-3);
      margin-top: var(--space-4);
    }
    .stat-item {
      text-align: center;
      padding: var(--space-3);
      background: rgba(0, 0, 0, 0.15);
      border-radius: var(--radius);
    }
    .stat-item__value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--sb-text-bright);
      line-height: 1.2;
    }
    .stat-item__label {
      font-size: 0.7rem;
      color: var(--sb-accent-dim);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    /* ===== Tables ===== */
    .admin-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .admin-table th {
      text-align: left;
      padding: var(--space-2) var(--space-3);
      font-weight: 600;
      color: var(--sb-accent-dim);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--sb-border);
      white-space: nowrap;
    }
    .admin-table td {
      padding: var(--space-2) var(--space-3);
      border-bottom: 1px solid rgba(232, 197, 142, 0.05);
      color: var(--sb-text);
      vertical-align: middle;
    }
    .admin-table tr:hover td {
      background: rgba(232, 197, 142, 0.04);
    }

    /* ===== Error alert ===== */
    .alert-error {
      background: rgba(220, 69, 69, 0.12);
      border: 1px solid rgba(220, 69, 69, 0.25);
      border-radius: var(--radius);
      padding: var(--space-3) var(--space-4);
      color: #f07070;
      font-size: 0.82rem;
      margin-top: var(--space-3);
      word-break: break-word;
    }
    .alert-success {
      background: rgba(76, 175, 124, 0.12);
      border: 1px solid rgba(76, 175, 124, 0.25);
      border-radius: var(--radius);
      padding: var(--space-3) var(--space-4);
      color: #6dd9a0;
      font-size: 0.82rem;
      margin-top: var(--space-3);
    }
    .alert-info {
      background: rgba(107, 140, 206, 0.12);
      border: 1px solid rgba(107, 140, 206, 0.25);
      border-radius: var(--radius);
      padding: var(--space-3) var(--space-4);
      color: #8db0e8;
      font-size: 0.82rem;
      margin-top: var(--space-3);
    }

    /* ===== Buttons ===== */
    .admin-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border: 1px solid var(--sb-border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      color: var(--sb-text-bright);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      line-height: 1.5;
      min-height: 36px;
    }
    .admin-btn:hover {
      background: rgba(232, 197, 142, 0.12);
      border-color: rgba(232, 197, 142, 0.25);
      color: var(--sb-accent);
    }
    .admin-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .admin-btn--primary {
      background: rgba(232, 197, 142, 0.15);
      border-color: rgba(232, 197, 142, 0.30);
      color: var(--sb-accent);
    }
    .admin-btn--primary:hover {
      background: rgba(232, 197, 142, 0.25);
    }
    .admin-btn--danger {
      border-color: rgba(220, 69, 69, 0.30);
      color: #f07070;
    }
    .admin-btn--danger:hover {
      background: rgba(220, 69, 69, 0.12);
    }
    .admin-btn--sm {
      padding: 2px var(--space-3);
      font-size: 0.75rem;
      min-height: 28px;
    }

    /* ===== Inline form ===== */
    .admin-input {
      padding: var(--space-2) var(--space-3);
      background: var(--sb-input-bg);
      border: 1px solid var(--sb-input-border);
      border-radius: var(--radius);
      color: var(--sb-text-bright);
      font-size: 0.82rem;
      font-family: inherit;
      outline: none;
      transition: border-color var(--transition);
      width: 100%;
    }
    .admin-input:focus {
      border-color: var(--sb-accent);
    }

    /* ===== Info pairs ===== */
    .info-row {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-2);
      font-size: 0.85rem;
      align-items: baseline;
    }
    .info-label {
      color: var(--sb-accent-dim);
      min-width: 90px;
      flex-shrink: 0;
    }
    .info-value {
      color: var(--sb-text-bright);
    }

    /* ===== Cron edit row ===== */
    .cron-edit-row {
      display: none;
    }
    .cron-edit-row.is-open {
      display: table-row;
    }
    .cron-edit-form {
      display: flex;
      gap: var(--space-2);
      align-items: center;
      flex-wrap: wrap;
    }

    /* ===== Spinner ===== */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(232, 197, 142, 0.20);
      border-top-color: var(--sb-accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== Empty state ===== */
    .empty-state {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--sb-accent-dim);
      font-size: 0.9rem;
    }

    /* ===== Button group ===== */
    .btn-group {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .admin-content {
        padding: var(--space-4);
      }
      .stat-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .admin-table {
        font-size: 0.75rem;
      }
      .admin-table th,
      .admin-table td {
        padding: var(--space-1) var(--space-2);
      }
      .btn-group {
        flex-direction: column;
      }
      .admin-btn {
        justify-content: center;
      }
    }

    /* ===== Text truncation ===== */
    .text-truncate {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .text-mono {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.78rem;
    }
  </style>
</head>
<body class="admin-body">
  <header class="admin-topbar">
    <a href="{{ url_for('catalog.index') }}" class="admin-topbar__back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Каталог
    </a>
    <span class="admin-topbar__title">Админ-панель</span>
  </header>

  <main class="admin-content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
