name: Publish Docker Image

on:
  push:
    branches: [master]
    tags:
      - "v*"

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag is on master
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "::error::Tag must be on the master branch. Aborting publish."
            exit 1
          fi

      - name: Determine tags
        id: meta
        run: |
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/litres_advanced_filters"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Explicit tag push (manual major/minor release)
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Master push without tag — auto-increment patch version
            LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
            if [[ -z "$LATEST_TAG" ]]; then
              VERSION="1.0.0"
            else
              # Parse major.minor.patch and bump patch
              BASE="${LATEST_TAG#v}"
              MAJOR=$(echo "$BASE" | cut -d. -f1)
              MINOR=$(echo "$BASE" | cut -d. -f2)
              PATCH=$(echo "$BASE" | cut -d. -f3)
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
            # Create and push the new tag (won't re-trigger: GITHUB_TOKEN
            # pushes don't trigger workflows to prevent infinite loops)
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${REPO}:${VERSION},${REPO}:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
