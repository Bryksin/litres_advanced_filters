[alembic]
# Path to the Alembic scripts directory (env.py, versions/).
# Relative to the location of this file (project root).
script_location = db

# The database URL is set dynamically in db/env.py from app.config.Config.DATABASE_URI
# so it respects the DATABASE_URI env var and the persistent/db/ mount in Docker.
# This placeholder is overridden at runtime — do not rely on it directly.
sqlalchemy.url = sqlite:///persistent/db/litres_cache.db

# Output encoding for generated migration scripts.
output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
